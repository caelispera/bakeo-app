        const currentDate = new Date(today);
        currentDate.setDate(today.getDate() - d);
        const dayStr = currentDate.toISOString().split('T')[0];
        const dayOfWeek = currentDate.getDay();

          const rand = createRandom(empIdx * 30 + d);
          const attendanceThreshold = (emp.attendanceRate / 100) - 0.05;
          const isPresent = rand() < attendanceThreshold;

      const handleSimulateNfcTap = (empId = simEmpId, devId = simDeviceId) => {
        const emp = employees.find(e => e.id === empId);
        const dev = nfcDevices.find(d => d.id === devId);
        if (!emp || !dev) { showToast('Invalid employee or device selected.', 'error'); return; }
        if (dev.status === 'Offline') { showToast(`Cannot tap: Device ${dev.id} at ${dev.location} is Offline.`, 'error'); return; }
        const now = new Date();
        const timeStr = now.toTimeString().split(' ')[0];
        const dateStr = selectedDate;
        const existingRecordIndex = attendanceRecords.findIndex(r => r.date === dateStr && r.employeeId === emp.id);
        let updatedRecords = [...attendanceRecords];
        let updatedEmployees = [...employees];
        let newStatus = 'Checked In', actionMsg = '';
        if (existingRecordIndex >= 0) {
          const rec = attendanceRecords[existingRecordIndex];
          if (rec.status === 'Checked In' || rec.status === 'Late') {
            const inParts = rec.clockIn.split(':').map(Number);
            const outParts = timeStr.split(':').map(Number);
            const hours = parseFloat(Math.max(0.1, (outParts[0] + outParts[1] / 60) - (inParts[0] + inParts[1] / 60)).toFixed(1));
            updatedRecords[existingRecordIndex] = { ...rec, clockOut: timeStr, hours, status: 'Checked Out' };
            newStatus = 'Checked Out'; actionMsg = `Checked Out (${hours} hrs)`;
          } else {
            updatedRecords[existingRecordIndex] = { ...rec, clockIn: timeStr, clockOut: null, hours: 0, status: 'Checked In' };
            newStatus = 'Checked In'; actionMsg = 'Checked In';
          }
        } else {
          const isLate = now.getHours() > 8 || (now.getHours() === 8 && now.getMinutes() > 0);
          newStatus = isLate ? 'Late' : 'Checked In';
          updatedRecords.push({ id: `REC-${dateStr}-${emp.id}`, employeeId: emp.id, employeeName: emp.name, department: emp.department, date: dateStr, clockIn: timeStr, clockOut: null, hours: 0, status: newStatus });
          actionMsg = newStatus === 'Late' ? 'Checked In (Late)' : 'Checked In';
        }
        if (dateStr === '2026-06-11') {
          updatedEmployees = employees.map(e => e.id === emp.id ? { ...e, status: newStatus } : e);
          setEmployees(updatedEmployees);
        }
        setAttendanceRecords(updatedRecords);
        setDeviceLogs([{ time: timeStr.slice(0, 5), device: dev.id, employee: emp.name, event: `NFC Tap - ${actionMsg} (Success)`, type: newStatus === 'Late' ? 'warning' : 'info' }, ...deviceLogs]);
        setNotifications([{ id: `NT${Date.now()}`, title: `NFC Tap: ${emp.name}`, preview: `${emp.name} tapped NFC card at ${dev.name} (${dev.location})`, type: 'Leave', audience: `${emp.department} Department`, status: 'Sent', time: new Date().toISOString(), sentBy: 'System' }, ...notifications]);
        setLastSyncTime(timeStr);
        setNfcDevices(nfcDevices.map(d => d.id === dev.id ? { ...d, lastSync: new Date().toISOString(), status: 'Online' } : d));
        setNfcModalOpen(false);
        showToast(`${emp.name} swiped at ${dev.name}. Status: ${newStatus}`);
      };

      const statsForSelectedDate = useMemo(() => {
        const dayRecords = attendanceRecords.filter(r => r.date === selectedDate);

        let present = 0, onTime = 0, late = 0, absent = 0, pending = 0;
        employees.forEach(emp => {
          if (!emp.active) return;
          const rec = dayRecords.find(r => r.employeeId === emp.id);
          if (rec) {
            if (rec.status === 'Checked In' || rec.status === 'Checked Out' || rec.status === 'Working') { present++; onTime++; }
            else if (rec.status === 'Late') { present++; late++; }
            else if (rec.status === 'Absent') absent++;

          <div className="grid grid-cols-2 gap-8">

                        <td className="py-3 font-mono font-bold text-slate-600">{rec.clockIn.slice(0, 5)}</td>
                        <td className="py-3 font-semibold text-red-600 text-right">+{delayMin} mins</td>
                      </tr>
                    );

                  {attendanceRecords.filter(r => r.date === selectedDate && r.status === 'Late').length === 0 && (
                    <tr><td colSpan="4" className="text-center py-6 text-slate-400 italic">No late clock-ins logged. Excellent punctuality!</td></tr>

    // ==========================================
    // PAGE 2: STAFF MANAGEMENT
    // ==========================================
    function StaffManagement({ employees, attendanceRecords, leaveRequests, selectedEmployeeId, setSelectedEmployeeId, showToast }) {
      const [tab, setTab] = useState('list');
      const [searchQuery, setSearchQuery] = useState('');
      const [deptFilter, setDeptFilter] = useState('');
      const [statusFilter, setStatusFilter] = useState('');
      const [page, setPage] = useState(1);
      const [rowsPerPage, setRowsPerPage] = useState(10);

      const activeCount = employees.filter(e => e.active).length;
      const inactiveCount = employees.filter(e => !e.active).length;
      const leaveTodayCount = leaveRequests.filter(l => l.status === 'Approved' && new Date('2026-06-11') >= new Date(l.startDate) && new Date('2026-06-11') <= new Date(l.endDate)).length;

      const filteredEmployees = useMemo(() => employees.filter(emp => {
        const matchesSearch = emp.name.toLowerCase().includes(searchQuery.toLowerCase()) || emp.email.toLowerCase().includes(searchQuery.toLowerCase()) || emp.id.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesSearch && (deptFilter ? emp.department === deptFilter : true) && (statusFilter ? emp.status === statusFilter : true);
      }), [employees, searchQuery, deptFilter, statusFilter]);

      const paginatedEmployees = useMemo(() => filteredEmployees.slice((page - 1) * rowsPerPage, page * rowsPerPage), [filteredEmployees, page, rowsPerPage]);
      const totalPages = Math.ceil(filteredEmployees.length / rowsPerPage) || 1;

      const currentEmployee = useMemo(() => employees.find(e => e.id === selectedEmployeeId) || employees[0], [employees, selectedEmployeeId]);

      const empStats = useMemo(() => {
        if (!currentEmployee) return { present: 0, late: 0, leave: 0, absent: 0, working: 0, rate: 0 };
        const empRecs = attendanceRecords.filter(r => r.employeeId === currentEmployee.id);
        let present = 0, late = 0, leave = 0, absent = 0;
        empRecs.forEach(r => {
          if (r.status === 'Checked Out' || r.status === 'Checked In' || r.status === 'Working') present++;
          else if (r.status === 'Late') { present++; late++; }
          else if (r.status === 'Absent') absent++;
          else if (r.status === 'On Leave') leave++;
        });
        const total = present + absent;
        return { present, late, leave, absent, working: total, rate: total > 0 ? Math.round((present / total) * 100) : 0 };
      }, [attendanceRecords, currentEmployee]);

      const trendData = useMemo(() => {
        const months = ['Jul 25', 'Aug 25', 'Sep 25', 'Oct 25', 'Nov 25', 'Dec 25', 'Jan 26', 'Feb 26', 'Mar 26', 'Apr 26', 'May 26', 'Jun 26'];
        const rand = createRandom((currentEmployee ? currentEmployee.name.length : 5) * 2);
        return months.map(m => {
          const avg = currentEmployee ? currentEmployee.attendanceRate : 90;
          return { name: m, rate: Math.min(100, Math.max(60, avg + Math.floor(rand() * 12) - 6)) };
        });
      }, [currentEmployee]);

      const breakdownData = [
        { name: 'On Time', value: empStats.present - empStats.late, color: '#10B981' },
        { name: 'Late', value: empStats.late, color: '#F59E0B' },
        { name: 'Leave Days', value: empStats.leave, color: '#3B82F6' },
        { name: 'Absent', value: empStats.absent, color: '#EF4444' }
      ].filter(d => d.value > 0);

      const monthlySummaryTable = useMemo(() => {
        const rand = createRandom((currentEmployee ? currentEmployee.name.length : 5) * 3);
        return [
          { name: 'May 2026', working: 21 },
          { name: 'June 2026', working: 9 }
        ].map(m => {
          const l = Math.floor(rand() * 2), lv = Math.floor(rand() * 2), a = rand() < 0.1 ? 1 : 0;
          const p = m.working - l - lv - a;
          return { name: m.name, onTime: p, late: l, leave: lv, absent: a, working: m.working, rate: Math.round((p / (m.working - lv)) * 100) };
        });
      }, [currentEmployee]);

      return (
        <div className="space-y-8 animate-slide-in">
          <div className="flex border-b border-slate-200">
            {['list', 'report'].map(t => (
              <button key={t} onClick={() => setTab(t)}
                className={`px-6 py-3 font-bold text-sm border-b-2 transition duration-150 ${tab === t ? 'border-accent-orange text-accent-orange' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>
                {t === 'list' ? 'Employee Directory' : 'Employee Profile & Report'}
              </button>
            ))}
          </div>

          {tab === 'list' && (
            <div className="space-y-6">
              <div className="grid grid-cols-4 gap-6">
                {[
                  { label: 'Total Enrolled', val: employees.length, sub: 'Registered NFC profiles' },
                  { label: 'Active Personnel', val: activeCount, sub: 'Currently eligible for shifts' },
                  { label: 'On Leave Today', val: leaveTodayCount, sub: 'Excused from duties' },
                  { label: 'Inactive / Suspended', val: inactiveCount, sub: 'Missing NFC assignments' },
                ].map((c, i) => (
                  <div key={i} className="p-5 rounded-xl border border-slate-200 shadow-sm bg-white flex flex-col justify-between h-24">
                    <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">{c.label}</span>
                    <span className="text-2xl font-extrabold text-slate-800">{c.val}</span>
                    <span className="text-[10px] text-slate-400 font-semibold">{c.sub}</span>
                  </div>
                ))}
              </div>

              <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm flex flex-wrap gap-4 items-center justify-between">
                <div className="flex flex-wrap gap-4 items-center flex-1">
                  <div className="relative w-64">
                    <Icon name="search" className="w-4 h-4 text-slate-400 absolute left-3.5 top-3" />
                    <input type="text" placeholder="Search name, ID or email..." value={searchQuery}
                      onChange={(e) => { setSearchQuery(e.target.value); setPage(1); }}
                      className="bg-slate-50 border border-slate-200 rounded-lg pl-10 pr-4 py-2 w-full text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-accent-orange text-slate-700 shadow-sm" />
                  </div>
                  <select value={deptFilter} onChange={(e) => { setDeptFilter(e.target.value); setPage(1); }}
                    className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-accent-orange text-slate-600 shadow-sm">
                    <option value="">All Departments</option>
                    {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
                  </select>
                  <select value={statusFilter} onChange={(e) => { setStatusFilter(e.target.value); setPage(1); }}
                    className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-accent-orange text-slate-600 shadow-sm">
                    <option value="">All Statuses</option>
                    {['Checked In', 'Checked Out', 'Late', 'NFC Pending', 'Absent'].map(s => <option key={s} value={s}>{s}</option>)}

                <button onClick={() => { setSearchQuery(''); setDeptFilter(''); setStatusFilter(''); setPage(1); }}

                <table className="w-full text-left text-xs border-collapse">

                    <tr className="bg-slate-50 border-b border-slate-200 text-slate-400 font-bold uppercase tracking-wider">

                      <th className="p-4">NFC Token ID</th><th className="p-4">Attendance Rate</th>

                    </tr>
                  </thead>
                  <tbody>
                    {paginatedEmployees.map((emp) => (

                              <span className="text-[10px] text-slate-400 font-semibold block">{emp.email}</span>

                          </div>
                        </td>
                        <td className="p-4">
                          <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold ${STATUS_COLORS[emp.status]?.bg || 'bg-gray-100 text-gray-700'}`}>

                  </tbody>

                    <select value={rowsPerPage} onChange={(e) => { setRowsPerPage(Number(e.target.value)); setPage(1); }} className="border border-slate-200 bg-white rounded px-2 py-1 focus:outline-none">

    // ==========================================
    function ReportsGenerator({ employees, attendanceRecords, leaveRequests, showToast }) {
      const [reportType, setReportType] = useState('Monthly Attendance Summary');
      const [selectedDept, setSelectedDept] = useState('');
      const [selectedEmpId, setSelectedEmpId] = useState('');
      const [dateStart, setDateStart] = useState('2026-05-12');
      const [dateEnd, setDateEnd] = useState('2026-06-11');

      const aggregates = useMemo(() => {
        const filtered = attendanceRecords.filter(r => {
          return new Date(r.date) >= new Date(dateStart) && new Date(r.date) <= new Date(dateEnd) &&
            (selectedDept ? r.department === selectedDept : true) &&
            (selectedEmpId ? r.employeeId === selectedEmpId : true);
        });
        let present = 0, late = 0, leave = 0, absent = 0;
        filtered.forEach(r => {
          if (r.status === 'Checked Out' || r.status === 'Checked In' || r.status === 'Working') present++;
          else if (r.status === 'Late') { present++; late++; }
          else if (r.status === 'Absent') absent++;
          else if (r.status === 'On Leave') leave++;
        });
        const totalWorkingDays = present + absent;
        return { present, late, leave, absent, totalWorkingDays, avgRate: totalWorkingDays > 0 ? Math.round((present / totalWorkingDays) * 100) : 92 };
      }, [attendanceRecords, selectedDept, selectedEmpId, dateStart, dateEnd]);

      const weeklyTrend = [
        { name: 'Wk 1 (May 15)', rate: 94 },
        { name: 'Wk 2 (May 22)', rate: 91 },
        { name: 'Wk 3 (May 29)', rate: 95 },
        { name: 'Wk 4 (June 5)', rate: 93 },
        { name: 'Wk 5 (June 11)', rate: aggregates.avgRate }
      ];

      const distribData = [
        { name: 'Present On Time', value: aggregates.present - aggregates.late, color: '#10B981' },
        { name: 'Late Arrivals', value: aggregates.late, color: '#F59E0B' },
        { name: 'Excused Leave', value: aggregates.leave, color: '#3B82F6' },
        { name: 'Unexcused Absences', value: aggregates.absent, color: '#EF4444' }
      ].filter(d => d.value > 0);

      const deptComparison = useMemo(() => DEPARTMENTS.map(dept => {
        const deptRecs = attendanceRecords.filter(r => r.department === dept && new Date(r.date) >= new Date(dateStart) && new Date(r.date) <= new Date(dateEnd));
        let present = 0, absent = 0;
        deptRecs.forEach(r => { if (r.status !== 'On Leave') { if (r.status === 'Absent') absent++; else present++; } });
        return { name: dept, rate: present + absent > 0 ? Math.round((present / (present + absent)) * 100) : 90 };
      }), [attendanceRecords, dateStart, dateEnd]);

      const tableRows = useMemo(() => employees.filter(e => (selectedDept ? e.department === selectedDept : true) && (selectedEmpId ? e.id === selectedEmpId : true)).map((emp, i) => {
        const empRecs = attendanceRecords.filter(r => r.employeeId === emp.id && new Date(r.date) >= new Date(dateStart) && new Date(r.date) <= new Date(dateEnd));
        let present = 0, late = 0, leave = 0, absent = 0;
        empRecs.forEach(r => {
          if (r.status === 'Checked Out' || r.status === 'Checked In' || r.status === 'Working') present++;
          else if (r.status === 'Late') { present++; late++; }
          else if (r.status === 'Absent') absent++;
          else if (r.status === 'On Leave') leave++;
        });
        const workingDays = present + absent;
        return { no: i + 1, name: emp.name, dept: emp.department, working: workingDays, present, late, leave, absent, rate: workingDays > 0 ? Math.round((present / workingDays) * 100) : emp.attendanceRate };
      }), [employees, attendanceRecords, selectedDept, selectedEmpId, dateStart, dateEnd]);

      return (

                  <option value="">All Employees</option>

              </div>
              <div>
                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-2">Date Start</label>

            </div>
            <div className="flex justify-end space-x-3 pt-2">

              <button onClick={() => showToast('Excel export queued. File will download shortly.')}

          </div>

          <div className="grid grid-cols-6 gap-4">
            {[
              { label: 'Workdays present', val: aggregates.present, color: 'text-green-600' },
              { label: 'Late exceptions', val: aggregates.late, color: 'text-amber-500' },
              { label: 'Excused leave', val: aggregates.leave, color: 'text-blue-500' },
              { label: 'Absences logged', val: aggregates.absent, color: 'text-red-500' },
              { label: 'Avg attendance', val: `${aggregates.avgRate}%`, color: 'text-indigo-600' },
              { label: 'Target workdays', val: aggregates.totalWorkingDays, color: 'text-slate-600' },
            ].map((c, i) => (
              <div key={i} className="p-4 bg-white border border-slate-200 rounded-xl shadow-sm text-center">
                <span className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest block mb-1">{c.label}</span>
                <span className={`text-xl font-extrabold ${c.color}`}>{c.val}</span>
              </div>

          <div className="grid grid-cols-12 gap-8">
            <div className="col-span-4 bg-white border border-slate-200 rounded-xl p-5 shadow-sm space-y-4">

              <div className="h-56 w-full">
                <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={weeklyTrend} margin={{ top: 10, right: 10, left: -25, bottom: 0 }}>

            <div className="col-span-4 bg-white border border-slate-200 rounded-xl p-5 shadow-sm space-y-4">
              <h4 className="font-extrabold text-slate-700 text-xs uppercase tracking-wider">Attendance Distribution</h4>
              <div className="h-56 w-full flex items-center justify-center relative">
                {distribData.length > 0 ? (
                  <ResponsiveContainer width="100%" height="100%">
                    <PieChart>
                      <Pie data={distribData} innerRadius={42} outerRadius={62} paddingAngle={3} dataKey="value">
                        {distribData.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.color} />)}

                  <span className="text-xl font-extrabold text-slate-700">{aggregates.avgRate}%</span>
                </div>
              </div>

            <div className="col-span-4 bg-white border border-slate-200 rounded-xl p-5 shadow-sm space-y-4">

    // ==========================================

    // ==========================================
    function LeaveRequestsPage({ employees, leaveRequests, setLeaveRequests, showToast, selectedDate }) {
      const [tab, setTab] = useState('All');
      const [deptFilter, setDeptFilter] = useState('');
      const [leaveTypeFilter, setLeaveTypeFilter] = useState('');

      // FIXED: form state managed separately; no <form> tags
      const [applyEmpId, setApplyEmpId] = useState('EMP0001');
      const [applyType, setApplyType] = useState('Annual');
      const [applyStart, setApplyStart] = useState('2026-06-15');
      const [applyEnd, setApplyEnd] = useState('2026-06-17');
      const [applyReason, setApplyReason] = useState('');

      const calculatedDays = useMemo(() => {
        if (!applyStart || !applyEnd) return 0;
        const diff = Math.ceil(Math.abs(new Date(applyEnd) - new Date(applyStart)) / (1000 * 60 * 60 * 24)) + 1;
        return isNaN(diff) ? 0 : diff;
      }, [applyStart, applyEnd]);

      const leaveStats = useMemo(() => ({
        pending: leaveRequests.filter(r => r.status === 'Pending').length,
        approved: leaveRequests.filter(r => r.status === 'Approved').length,
        rejected: leaveRequests.filter(r => r.status === 'Rejected').length,
        totalApprovedDays: leaveRequests.filter(r => r.status === 'Approved').reduce((sum, r) => sum + r.days, 0),
      }), [leaveRequests]);

      const filteredRequests = useMemo(() => leaveRequests.filter(req => {
        return (tab === 'All' ? true : req.status === tab) &&
          (deptFilter ? req.department === deptFilter : true) &&
          (leaveTypeFilter ? req.leaveType === leaveTypeFilter : true);
      }), [leaveRequests, tab, deptFilter, leaveTypeFilter]);

      // FIXED: no e.preventDefault() — plain function, not form submit handler
      const handleApplyLeave = () => {
        if (!applyReason.trim()) { showToast('Please enter a reason for the leave request.', 'error'); return; }
        const emp = employees.find(e => e.id === applyEmpId);
        if (!emp) { showToast('Invalid employee selected.', 'error'); return; }
        const newReq = {
          id: `LV${String(leaveRequests.length + 1).padStart(3, '0')}`,
          employeeId: emp.id, employeeName: emp.name, department: emp.department,
          leaveType: applyType, startDate: applyStart, endDate: applyEnd,
          days: calculatedDays, reason: applyReason, status: 'Pending',
          appliedOn: new Date().toISOString().split('T')[0]
        };
        setLeaveRequests([newReq, ...leaveRequests]);
        setApplyReason('');
        showToast(`Leave submitted for ${emp.name} (${calculatedDays} days). Pending approval.`);
      };

      const handleEvaluateRequest = (reqId, isApproved) => {
        const status = isApproved ? 'Approved' : 'Rejected';
        setLeaveRequests(leaveRequests.map(r => r.id === reqId ? { ...r, status } : r));
        showToast(`Leave request ${reqId} has been ${status.toLowerCase()}.`);
      };

      const calendarDays = useMemo(() => {
        const days = [];
        for (let i = 1; i <= 30; i++) {
          const dayStr = `2026-06-${String(i).padStart(2, '0')}`;
          const activeLeaves = leaveRequests.filter(req => {
            if (req.status !== 'Approved') return false;
            const d = new Date(dayStr);
            return d >= new Date(req.startDate) && d <= new Date(req.endDate);
          });
          days.push({ day: i, dateStr: dayStr, leaves: activeLeaves });
        }
        return days;
      }, [leaveRequests]);

      return (
        <div className="space-y-8 animate-slide-in">
          <div className="grid grid-cols-4 gap-6">
            {[
              { label: 'Pending Evaluation', val: leaveStats.pending, sub: 'Needs manager review', color: 'border-l-4 border-amber-400' },
              { label: 'Approved Requests', val: leaveStats.approved, sub: 'Active & upcoming', color: 'border-l-4 border-green-500' },
              { label: 'Rejected Applications', val: leaveStats.rejected, sub: 'Disallowed applications', color: 'border-l-4 border-red-500' },
              { label: 'Total Leave Days', val: `${leaveStats.totalApprovedDays} days`, sub: 'Excused from shifts', color: 'border-l-4 border-slate-400' },
            ].map((c, i) => (
              <div key={i} className={`p-5 bg-white border border-slate-200 rounded-xl shadow-sm flex flex-col justify-between h-24 ${c.color}`}>
                <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">{c.label}</span>
                <span className="text-2xl font-extrabold text-slate-800">{c.val}</span>
                <span className="text-[10px] text-slate-400 font-semibold">{c.sub}</span>
              </div>
            ))}
          </div>

          <div className="grid grid-cols-12 gap-8">
            <div className="col-span-8 space-y-6">
              <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-6 space-y-4">
                <div className="flex justify-between items-center flex-wrap gap-2">
                  <div>
                    <h3 className="font-extrabold text-slate-800 text-base">Leave Requests Registry</h3>
                    <p className="text-xs text-slate-400 font-semibold">Active workflow items needing management attention</p>
                  </div>
                  <div className="flex bg-slate-100 border p-1 rounded-lg space-x-1">
                    {['All', 'Pending', 'Approved', 'Rejected'].map(t => (
                      <button key={t} onClick={() => setTab(t)}
                        className={`text-xs px-3 py-1 font-bold rounded-md transition ${tab === t ? 'bg-white text-navy-800 shadow' : 'text-slate-500 hover:text-slate-800'}`}>{t}</button>
                    ))}
                  </div>
                </div>
                <div className="flex items-center space-x-4">
                  <select value={deptFilter} onChange={(e) => setDeptFilter(e.target.value)}
                    className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-semibold text-slate-600 focus:outline-none">
                    <option value="">All Divisions</option>
                    {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
                  </select>
                  <select value={leaveTypeFilter} onChange={(e) => setLeaveTypeFilter(e.target.value)}
                    className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-semibold text-slate-600 focus:outline-none">
                    <option value="">All Leave Types</option>
                    {['Annual', 'Sick', 'Medical', 'Unpaid'].map(l => <option key={l} value={l}>{l}</option>)}
                  </select>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-xs border-collapse">
                    <thead>
                      <tr className="border-b border-slate-200 text-slate-400 font-bold uppercase tracking-wider">
                        <th className="py-2.5">Employee</th><th className="py-2.5">Dept</th><th className="py-2.5">Type</th>
                        <th className="py-2.5">Schedule</th><th className="py-2.5 text-center">Days</th>
                        <th className="py-2.5">Reason</th><th className="py-2.5">Status</th><th className="py-2.5 text-right">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredRequests.map((req) => (
                        <tr key={req.id} className="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition duration-75">
                          <td className="py-3 font-bold text-slate-800">{req.employeeName}</td>
                          <td className="py-3"><span className={`text-[9px] font-bold px-2 py-0.5 rounded ${DEPT_COLORS[req.department]?.bg || 'bg-gray-100 text-gray-700'}`}>{req.department}</span></td>
                          <td className="py-3"><span className={`text-[10px] font-bold ${req.leaveType === 'Annual' ? 'text-green-600' : req.leaveType === 'Sick' ? 'text-orange-500' : req.leaveType === 'Medical' ? 'text-blue-600' : 'text-gray-500'}`}>{req.leaveType}</span></td>
                          <td className="py-3 text-slate-500 font-semibold">{req.startDate} → {req.endDate}</td>
                          <td className="py-3 text-center font-bold text-slate-600">{req.days}</td>
                          <td className="py-3 text-slate-500 truncate max-w-[120px] font-medium" title={req.reason}>{req.reason}</td>
                          <td className="py-3"><span className={`px-2 py-0.5 rounded-full text-[9px] font-bold ${STATUS_COLORS[req.status]?.bg || 'bg-gray-100 text-gray-700'}`}>{req.status}</span></td>
                          <td className="py-3 text-right space-x-2">
                            {req.status === 'Pending' ? (
                              <React.Fragment>
                                <button onClick={() => handleEvaluateRequest(req.id, true)} className="text-green-600 hover:text-green-800 font-bold">Approve</button>
                                <button onClick={() => handleEvaluateRequest(req.id, false)} className="text-red-500 hover:text-red-700 font-bold">Reject</button>
                              </React.Fragment>
                            ) : <span className="text-slate-400 font-semibold italic text-[10px]">Evaluated</span>}
                          </td>
                        </tr>
                      ))}
                      {filteredRequests.length === 0 && <tr><td colSpan="8" className="text-center py-6 text-slate-400 italic">No leave requests found.</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            <div className="col-span-4 space-y-6">
              <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm space-y-4">
                <h3 className="font-extrabold text-slate-800 text-sm">Leave Balances</h3>
                <div className="space-y-3">
                  {[
                    { label: 'Annual Leave Balance', val: '18.5 / 25.0 Days', pct: 74, color: 'bg-green-500' },
                    { label: 'Sick Leave Balance', val: '8.0 / 12.0 Days', pct: 66, color: 'bg-orange-500' },
                    { label: 'Medical Leave Balance', val: '4.0 / 10.0 Days', pct: 40, color: 'bg-blue-500' },
                    { label: 'Unpaid Leave Logged', val: '6.0 Days Used', pct: 100, color: 'bg-gray-400' },
                  ].map((b, i) => (
                    <div key={i} className="space-y-1">
                      <div className="flex justify-between text-xs font-semibold">
                        <span className="text-slate-500">{b.label}</span>
                        <span className="text-slate-800">{b.val}</span>
                      </div>
                      <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden border">
                        <div className={`h-full ${b.color}`} style={{ width: `${b.pct}%` }}></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm space-y-4">
                <div className="flex justify-between items-center">
                  <h3 className="font-extrabold text-slate-800 text-sm">Team Leave Calendar</h3>
                  <span className="text-[10px] bg-slate-100 text-slate-600 font-bold px-2 py-0.5 rounded">June 2026</span>
                </div>
                <div className="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-slate-400 mb-1">
                  {['M', 'T', 'W', 'T', 'F', 'S', 'S'].map((d, i) => <span key={i}>{d}</span>)}
                </div>
                <div className="grid grid-cols-7 gap-1">
                  {calendarDays.map((d) => {
                    const hasLeave = d.leaves.length > 0;
                    const isToday = d.dateStr === '2026-06-11';
                    return (
                      <div key={d.day} title={hasLeave ? d.leaves.map(l => `${l.employeeName} (${l.leaveType})`).join('\n') : ''}
                        className={`h-9 border border-slate-200 rounded flex flex-col justify-between p-1 bg-slate-50 relative hover:bg-slate-100 cursor-pointer ${isToday ? 'border-accent-orange bg-orange-50' : ''}`}>
                        <span className={`text-[9px] font-bold ${isToday ? 'text-accent-orange font-black' : 'text-slate-500'}`}>{d.day}</span>
                        {hasLeave && (
                          <div className="flex justify-center space-x-0.5">
                            {d.leaves.slice(0, 3).map((l, i) => (
                              <span key={i} className={`w-1.5 h-1.5 rounded-full ${l.leaveType === 'Annual' ? 'bg-green-500' : l.leaveType === 'Sick' ? 'bg-orange-500' : l.leaveType === 'Medical' ? 'bg-blue-500' : 'bg-gray-400'}`}></span>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>

          {/* FIXED: replaced <form onSubmit> with plain <div> + onClick button */}
          <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">

              <div className="col-span-3">
                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-2">Employee</label>
                <select value={applyEmpId} onChange={(e) => setApplyEmpId(e.target.value)}
                  className="bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-semibold focus:outline-none w-full text-slate-700 shadow-sm">
                  {employees.map(e => <option key={e.id} value={e.id}>{e.name} ({e.department})</option>)}
                </select>
              </div>
              <div className="col-span-2">
                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-2">Leave Type</label>
                <select value={applyType} onChange={(e) => setApplyType(e.target.value)}
                  className="bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-semibold focus:outline-none w-full text-slate-700 shadow-sm">
                  <option>Annual</option><option>Sick</option><option>Medical</option><option>Unpaid</option>
                </select>

    // ==========================================
    // PAGE 8: SYSTEM NOTIFICATIONS
    // ==========================================
    function NotificationsPage({ notifications, setNotifications, showToast }) {
      const [tab, setTab] = useState('All');
      const [notifTitle, setNotifTitle] = useState('');
      const [notifPreview, setNotifPreview] = useState('');
      const [notifType, setNotifType] = useState('Announcement');
      const [notifAudience, setNotifAudience] = useState('All Employees');
      const [typeFilter, setTypeFilter] = useState('');

      const filtered = useMemo(() => notifications.filter(n => {
        return (tab === 'All' ? true : n.status === tab) && (typeFilter ? n.type === typeFilter : true);
      }), [notifications, tab, typeFilter]);

      const counts = useMemo(() => ({
        total: notifications.length,
        sent: notifications.filter(n => n.status === 'Sent').length,
        scheduled: notifications.filter(n => n.status === 'Scheduled').length,
        failed: notifications.filter(n => n.status === 'Failed').length,
      }), [notifications]);

      // FIXED: plain function, no e.preventDefault()
      const handleCreateNotif = () => {
        if (!notifTitle.trim() || !notifPreview.trim()) { showToast('Please fill in both the title and message body.', 'error'); return; }
        const newNotif = {
          id: `NT${Date.now()}`, title: notifTitle, preview: notifPreview,
          type: notifType, audience: notifAudience, status: 'Sent',
          time: new Date().toISOString(), sentBy: 'Admin Control Hub'
        };
        setNotifications([newNotif, ...notifications]);
        setNotifTitle('');
        setNotifPreview('');
        showToast('Notification dispatched successfully.');
      };

      const handleDeleteNotif = (id) => {
        setNotifications(notifications.filter(n => n.id !== id));
        showToast('Notification removed from registry.', 'info');
      };

      const notifTypeIcon = (type) => {
        if (type === 'Alert') return 'alertCircle';
        if (type === 'Reminder') return 'clock';
        if (type === 'Leave') return 'leave';
        return 'notifications';
      };

      const notifTypeColor = (type) => {
        if (type === 'Alert') return 'text-red-500';
        if (type === 'Reminder') return 'text-amber-500';
        if (type === 'Leave') return 'text-blue-500';
        return 'text-indigo-500';
      };

      return (
        <div className="grid grid-cols-12 gap-8 animate-slide-in">
          <div className="col-span-8 space-y-6">
            <div className="grid grid-cols-4 gap-4">
              {[
                { label: 'Total Notifications', val: counts.total, color: 'border-slate-300' },
                { label: 'Sent Alerts', val: counts.sent, color: 'border-green-400' },
                { label: 'Scheduled', val: counts.scheduled, color: 'border-blue-400' },
                { label: 'Dispatch Failures', val: counts.failed, color: 'border-red-400' },
              ].map((c, i) => (
                <div key={i} className={`p-4 bg-white border border-slate-200 rounded-xl shadow-sm border-l-4 ${c.color} flex flex-col justify-between h-20`}>
                  <span className="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">{c.label}</span>
                  <span className="text-xl font-black text-slate-800">{c.val}</span>
                </div>
              ))}
            </div>

            <div className="bg-white border border-slate-200 rounded-xl shadow-sm p-6 space-y-4">
              <div className="flex justify-between items-center flex-wrap gap-2">
                <div>
                  <h3 className="font-extrabold text-slate-800 text-base">Broadcast Registry Log</h3>
                  <p className="text-xs text-slate-400 font-semibold">Notifications dispatched across NFC targets and personnel</p>
                </div>
                <div className="flex items-center space-x-2">
                  <select value={typeFilter} onChange={(e) => setTypeFilter(e.target.value)}
                    className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-semibold text-slate-600 focus:outline-none">
                    <option value="">All Types</option>
                    {['Announcement', 'Alert', 'Reminder', 'Leave'].map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                  <div className="flex bg-slate-100 p-1 border rounded-lg space-x-1">
                    {['All', 'Sent', 'Scheduled', 'Failed'].map(t => (
                      <button key={t} onClick={() => setTab(t)}
                        className={`text-xs px-3 py-1 font-bold rounded-md transition ${tab === t ? 'bg-white text-navy-800 shadow' : 'text-slate-500 hover:text-slate-800'}`}>{t}</button>
                    ))}
                  </div>
                </div>
              </div>

              <div className="overflow-y-auto max-h-[480px] space-y-3 pr-1">
                {filtered.map(notif => (
                  <div key={notif.id} className="border border-slate-200 rounded-xl p-4 bg-slate-50/20 hover:bg-slate-50 transition flex items-start space-x-4">
                    <div className="w-9 h-9 rounded-xl bg-slate-100 flex items-center justify-center border shrink-0">
                      <Icon name={notifTypeIcon(notif.type)} className={`w-5 h-5 ${notifTypeColor(notif.type)}`} />
                    </div>
                    <div className="flex-1 space-y-1">
                      <div className="flex justify-between items-start">
                        <h4 className="font-extrabold text-slate-800 text-sm">{notif.title}</h4>
                        <div className="flex items-center space-x-2">
                          <span className={`px-2 py-0.5 rounded text-[8px] font-bold ${notif.status === 'Sent' ? 'bg-green-100 text-green-800' : notif.status === 'Scheduled' ? 'bg-blue-100 text-blue-800' : 'bg-red-100 text-red-800'}`}>{notif.status}</span>
                          <button onClick={() => handleDeleteNotif(notif.id)} className="text-slate-300 hover:text-red-400 transition"><Icon name="trash" className="w-3.5 h-3.5" /></button>
                        </div>
                      </div>
                      <p className="text-xs text-slate-500 font-semibold leading-relaxed">{notif.preview}</p>
                      <div className="flex justify-between text-[10px] text-slate-400 font-bold pt-1">
                        <span>Target: {notif.audience} · By: {notif.sentBy}</span>
                        <span>{notif.time.slice(0, 10)} {notif.time.slice(11, 16)}</span>
                      </div>
                    </div>
                  </div>
                ))}
                {filtered.length === 0 && <div className="text-center py-8 text-slate-400 italic text-sm">No notifications match your filter.</div>}
              </div>
            </div>
          </div>

          <div className="col-span-4 space-y-6">
            {/* FIXED: replaced <form onSubmit> with plain <div> + onClick */}
            <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm space-y-4">
              <h3 className="font-extrabold text-slate-800 text-sm">Dispatch New Broadcast</h3>
              <div className="space-y-3">
                <div>
                  <label className="block text-[9px] font-bold text-slate-400 uppercase mb-1">Title</label>
                  <input type="text" value={notifTitle} onChange={(e) => setNotifTitle(e.target.value)} placeholder="E.g. Safety Drill Schedule"
                    className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs font-semibold focus:outline-none text-slate-700 shadow-sm" />
                </div>
                <div>
                  <label className="block text-[9px] font-bold text-slate-400 uppercase mb-1">Alert Category</label>
                  <select value={notifType} onChange={(e) => setNotifType(e.target.value)}
                    className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs font-semibold focus:outline-none text-slate-700 shadow-sm">
                    <option>Announcement</option><option>Alert</option><option>Reminder</option>
                  </select>
                </div>
                <div>
                  <label className="block text-[9px] font-bold text-slate-400 uppercase mb-1">Target Audience</label>
                  <select value={notifAudience} onChange={(e) => setNotifAudience(e.target.value)}
                    className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs font-semibold focus:outline-none text-slate-700 shadow-sm">
                    <option>All Employees</option><option>IT Department</option><option>HSE Department</option>
                    <option>Operations Department</option><option>Finance Department</option><option>All Managers</option>
                  </select>
                </div>
                <div>
                  <label className="block text-[9px] font-bold text-slate-400 uppercase mb-1">Message Body</label>
                  <textarea rows="3" value={notifPreview} onChange={(e) => setNotifPreview(e.target.value)} placeholder="Enter broadcast content details..."
                    className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs font-semibold focus:outline-none text-slate-700 shadow-sm" />
                </div>
                <button onClick={handleCreateNotif}
                  className="w-full bg-accent-orange hover:bg-orange-600 text-white font-bold py-2 rounded-lg text-xs shadow-md transition flex items-center justify-center">
                  <Icon name="send" className="w-3.5 h-3.5 mr-2" />Send Broadcast
                </button>
              </div>
            </div>

            <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm space-y-3">
              <h3 className="font-extrabold text-slate-800 text-sm">Dispatch Routes</h3>
              <div className="space-y-2.5 text-xs text-slate-600 font-semibold">
                {[
                  ['E-Mail Route', true], ['In-App Alerts', true],
                  ['SMS Gateway', false], ['Push Notifications', true],
                ].map(([label, enabled]) => (
                  <div key={label} className="flex justify-between items-center">
                    <span>{label}</span>
                    <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${enabled ? 'bg-green-100 text-green-800' : 'bg-slate-200 text-slate-600'}`}>{enabled ? 'Enabled' : 'Disabled'}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm space-y-3">
              <h3 className="font-extrabold text-slate-800 text-sm">Notification Summary</h3>
              <div className="space-y-2 text-xs">
                {[['Announcement', notifications.filter(n => n.type === 'Announcement').length, 'text-indigo-600'], ['Alert', notifications.filter(n => n.type === 'Alert').length, 'text-red-500'], ['Reminder', notifications.filter(n => n.type === 'Reminder').length, 'text-amber-500'], ['Leave', notifications.filter(n => n.type === 'Leave').length, 'text-blue-500']].map(([type, count, color]) => (
                  <div key={type} className="flex justify-between items-center">
                    <span className="text-slate-500 font-semibold">{type}</span>
                    <span className={`font-extrabold ${color}`}>{count}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>

</html>
